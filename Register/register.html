<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./register.css">
    <title>Register</title>
</head>
<body>
    <form action="../login/login.html">
        <fieldset>
            <table><tr>
            <legend>Register</legend>
            <td><label for="name">Name:</label></td>
            <td><input type="text" id="name" required placeholder="Enter your name"></td>
            </tr>
            <tr>
            <td><label for="Phno">Mobile Number:</label></td>
            <td><input type="number" id="Phno" minlength="10" maxlength="10" placeholder="Enter your mobile number" required></td>
            </tr>
            <tr>
            <td><label for="uid">Aadhaar Number:</label></td>
            <td><input type="number" id="uid" minlength="12" maxlength="12" placeholder="Enter your Aadhaar number" required></td>
            </tr>
            <tr>
                <td><button>Submit</button></td>
            <td><Button>Reset</Button></td>
            </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
